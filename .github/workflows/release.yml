name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace dependencies
        run: npm ci

      - name: Install Python build tooling
        run: python -m pip install --upgrade build

      - name: Validate release metadata
        run: npm run release:check -- "${GITHUB_REF_NAME}"

      - name: Run unit tests
        run: npm test

      - name: Build TypeScript package
        run: npm run build:typescript

      - name: Build Python package
        run: npm run build:python

      - name: Check npm tarball contents
        run: npm run pack:typescript

      - name: Smoke test built TypeScript package
        run: npm run smoke:typescript

      - name: Smoke test built Python package
        run: npm run smoke:python

  publish-npm:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install workspace dependencies
        run: npm ci

      - name: Validate release metadata
        run: npm run release:check -- "${GITHUB_REF_NAME}"

      - name: Build TypeScript package
        run: npm run build:typescript

      - name: Publish to npm
        run: npm publish --workspace typescript --access public --provenance

  publish-pypi:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build Python package
        run: python -m build python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
